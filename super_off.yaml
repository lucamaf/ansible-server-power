---
- name: Gracefully shutdown all VMs and host
  hosts: ocp_hosts
  become: true
  gather_facts: no

  tasks:
    - name: Get list of running VMs
      shell: virsh list --name
      register: running_vms
      changed_when: false

    - name: Shutdown all running VMs
      shell: virsh shutdown {{ item }}
      loop: "{{ running_vms.stdout_lines }}"
      when: item != ""
      ignore_errors: true

    - name: Wait until all VMs are shut off
      shell: virsh list --name
      register: remaining_vms
      until: remaining_vms.stdout_lines | select('match', '.+') | list | length == 0
      retries: 30
      delay: 10

    - name: Call API to turn off monitoring
      uri:
        url: "https://api.uptimerobot.com/v2/editMonitor"
        method: POST
        headers:
          Authorization: "u152655-1f9527cfec215e6c9f2fa739"
          Content-Type: "application/x-www-form-urlencoded"
          Cache-Control: "no-cache"
        body: 
          api_key: u152655-1f9527cfec215e6c9f2fa739
          format: json
          id: 797243183
          status: 0
        body_format: form-urlencoded
        status_code: 200

    - name: Shutdown the host
      shell: shutdown -h now
      async: 1
      poll: 0
